<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="theme-color" content="#f5f4f0">
<title>nightdrivejp | おすすめ商品リンク集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f5f4f0;
    --white: #ffffff;
    --border: #e4e2dd;
    --text: #1a1a1a;
    --text-sub: #5a5a5a;
    --text-muted: #999;
    --card-bg: #eceae4;
    --radius: 14px;
    --shadow: 0 2px 8px rgba(0,0,0,0.07);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: calc(40px + var(--safe-bottom));
    -webkit-font-smoothing: antialiased;
  }
  .header {
    padding: 32px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--border);
    box-shadow: var(--shadow);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .account-name { font-size: 1.05rem; font-weight: 700; }
  .account-bio { font-size: 0.75rem; color: var(--text-sub); text-align: center; line-height: 1.7; }
  .sns-icons { display: flex; gap: 14px; margin-top: 2px; }
  .sns-icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--white);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }
  .sns-icon-btn svg { width: 15px; height: 15px; fill: var(--text); }

  /* ── Cards ── */
  .cards { display: flex; flex-direction: column; gap: 10px; padding: 12px 12px 0; }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: row;
    height: 120px;
    text-decoration: none;
    color: var(--text);
    position: relative;
    box-shadow: var(--shadow);
    transition: transform 0.12s;
  }
  .card:active { transform: scale(0.98); box-shadow: none; }

  .card-img {
    width: 130px; flex-shrink: 0;
    background: #d8d5cd;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img .emoji { font-size: 44px; }

  /* タグ（badge）共通スタイル */
  .badge {
    position: absolute;
    top: 7px; left: 7px;
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    color: white;
    line-height: 1.6;
  }
  .badge-new  { background: #2f2f2f; }
  .badge-sale { background: #d94f3d; }
  .badge-hot  { background: #d97706; }

  .card-body {
    flex: 1; min-width: 0;
    padding: 12px 14px 12px 12px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .card-top { display: flex; flex-direction: column; gap: 4px; }
  .card-title {
    font-size: 0.85rem; font-weight: 700; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-desc {
    font-size: 0.7rem; color: var(--text-sub); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-bottom { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .card-price { font-size: 0.9rem; font-weight: 700; }
  .card-pills { display: flex; gap: 4px; flex-wrap: wrap; }

  /* ピル（送料無料など）*/
  .pill {
    font-size: 0.58rem; font-weight: 500;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(0,0,0,0.07);
    color: var(--text-sub);
  }
  .pill-free    { background: #dcfce7; color: #166534; }
  .pill-point   { background: #fef9c3; color: #854d0e; }
  .pill-caution { background: #fee2e2; color: #991b1b; }

  .footer {
    text-align: center;
    padding: 20px 16px 8px;
    font-size: 0.63rem;
    color: var(--text-muted);
  }
  .header { animation: fadeUp 0.45s ease both; }
  .cards  { animation: fadeUp 0.45s 0.08s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
